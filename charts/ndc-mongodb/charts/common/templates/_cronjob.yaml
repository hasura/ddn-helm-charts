{{- define "common.cronjob" -}}
{{- if .Capabilities.APIVersions.Has "batch/v1beta1" }}
apiVersion: batch/v1beta1
{{- else }}
apiVersion: batch/v2alpha1
{{- end }}
kind: CronJob
metadata:
  name: {{ template "common.name" . }}
  namespace: {{ template "common.namespace" . }}
  labels:
{{- include "common.labels" . | nindent 4 }}
spec:
  concurrencyPolicy: {{ .Values.cron.concurrencyPolicy }}
  schedule: {{ .Values.cron.schedule | quote }}
  jobTemplate:
    spec: 
      template:
        metadata:  
          annotations:
            deployment-timestamp: "{{ date "20060102150405" now }}"
          labels:
          {{- include "common.labels" . | nindent 12 }}
        spec:
        {{- if .Values.extraVolumes }}
          volumes:      
          {{- with .Values.extraVolumes }}
            {{- include "common.tplOrYaml" (set (deepCopy $) "value" .) | nindent 12 }}
          {{- end }}
        {{- end }}
          containers:
          {{- with .Values.extraContainers }}
            {{- include "common.tplOrYaml" (set (deepCopy $) "value" .)  | nindent 12 }}
          {{- end }}
          - name: {{ template "common.name" . }}
            image: "{{ template "common.image" (dict "Values" $.Values "repository" .Values.image.repository "tag" .Values.image.tag) }}"
            imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.args }}
            args:
            {{- include "common.tplOrYaml" (set (deepCopy $) "value" .) | nindent 12 }}
          {{- end }}
            ports:
              - name: http
                containerPort: {{ .Values.httpPort }}
                protocol: TCP
          {{- if .Values.extraVolumeMounts }}
            volumeMounts:
            {{- with .Values.extraVolumeMounts }}
              {{- include "common.tplOrYaml" (set (deepCopy $) "value" .) | nindent 14 }}
            {{- end }}
          {{- end }}
          {{- with .Values.env }}
            env:
                {{- include "common.tplOrYaml" (set (deepCopy $) "value" .) | nindent 14 }}
          {{- end }}
          {{- with .Values.resources }}
            resources:
                {{- include "common.tplOrYaml" (set (deepCopy $) "value" .) | nindent 14 }}
          {{- end }}
          restartPolicy: {{ .Values.cron.restartPolicy }}
{{- end -}}
