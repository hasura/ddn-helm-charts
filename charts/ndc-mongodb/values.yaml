useReleaseName: true

# Global values shared across charts. Overridden by parent/umbrella charts.
global:
  # Toggle to read secrets from an external secret store (Azure Key Vault / AWS
  # Secrets Manager) via the secret-refresher init container. When true, the
  # main container image tag is suffixed with `-env-loader` so the entrypoint
  # loads env vars from `/secrets/*.json` written by secret-refresher-init.
  externalSecrets:
    enabled: false
  # When false, the chart skips rendering Kubernetes Secret resources — secret
  # values are expected to come from the external secret store instead.
  deploySecrets: true

additionalAnnotations: |
  {{- if .Values.global.deploySecrets }}
  checksum/config: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
  {{- end }}
  app.kubernetes.io/access-group: connector

networkPolicy:
  ingress:
    enabled: true
    allowedApps:
      - v3-engine

# When externalSecrets is enabled the secret-refresher pattern in the `common`
# library is used: an init container fetches secrets from the configured cloud
# vault and writes them as JSON to a shared emptyDir at /secrets, which the
# main container's `-env-loader` entrypoint reads at startup.
externalSecrets:
  enabled: false

# Container Configs
image:
  repository: ""
  tag: ""
  pullPolicy: IfNotPresent
  # Appended to the image tag when external secrets are enabled so the chart
  # selects the env-loader variant of the image. Evaluated by `common.image`.
  tagSuffix: |
    {{- if and .Values.global.externalSecrets.enabled .Values.externalSecrets.enabled -}}
    {{- print "-env-loader" -}}
    {{- end -}}
replicas: "1"
wsInactiveExpiryMins: "1"
securityContext:
  runAsNonRoot: true
  runAsGroup: 1000
  runAsUser: 1000
  fsGroup: 1000

containerSecurityContext:
#  runAsNonRoot: true
#  allowPrivilegeEscalation: false
#  capabilities:
#    drop:
#    - ALL
#  readOnlyRootFilesystem: true

serviceAccount:
  enabled: false
  name: ""

initContainers:
  gitSync:
    enabled: false
    repo: "git@github.com:<org>/<repo>"
    branch: "main"
    secretName: ""

healthChecks:
  enabled: false
  livenessProbePath: "/healthz"
  readinessProbePath: "/healthz"

hpa:
  enabled: false
  minReplicas: 2
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50  # Target 50% CPU utilization per pod

resources: |
  requests:
    cpu: "500m"
    memory: "500Mi"
  limits:
    cpu: "1"
    memory: "1Gi"

connectorEnvVars:
  HASURA_SERVICE_TOKEN_SECRET: ""
  MONGODB_DATABASE_URI: ""
  configDirectory: ""
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://dp-otel-collector:4317"
  OTEL_SERVICE_NAME: ""

env: |
  {{- if .Values.connectorEnvVars.HASURA_SERVICE_TOKEN_SECRET }}
  - name: HASURA_SERVICE_TOKEN_SECRET
    valueFrom:
      secretKeyRef:
        key: HASURA_SERVICE_TOKEN_SECRET
        name: {{ printf "%s-secret" (include "common.name" .) }}
  {{- end }}
  - name: MONGODB_DATABASE_URI
    valueFrom:
      secretKeyRef:
        key: MONGODB_DATABASE_URI
        name: {{ printf "%s-secret" (include "common.name" .) }}
  - name: OTEL_EXPORTER_OTLP_ENDPOINT
    value: {{ .Values.connectorEnvVars.OTEL_EXPORTER_OTLP_ENDPOINT }}
  {{- if .Values.connectorEnvVars.OTEL_SERVICE_NAME }}
  - name: OTEL_SERVICE_NAME
    value: {{ .Values.connectorEnvVars.OTEL_SERVICE_NAME }}
  {{- else }}
  - name: OTEL_SERVICE_NAME
    value: {{ .Chart.Name }}
  {{- end }}
  {{- if .Values.connectorEnvVars.configDirectory }}
  - name: HASURA_CONFIGURATION_DIRECTORY
    value: {{ .Values.connectorEnvVars.configDirectory }}
  {{- end }}
