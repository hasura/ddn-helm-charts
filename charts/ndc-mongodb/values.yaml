useReleaseName: true

additionalAnnotations: |
  checksum/config: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
  app.kubernetes.io/access-group: connector

networkPolicy:
  ingress:
    enabled: true
    allowedApps:
      - v3-engine

# Container Configs
image:
  repository: ""
  tag: ""
  pullPolicy: IfNotPresent
replicas: "1"
wsInactiveExpiryMins: "1"
securityContext:
  runAsNonRoot: true
  runAsGroup: 1000
  runAsUser: 1000
  fsGroup: 1000

containerSecurityContext:
#  runAsNonRoot: true
#  allowPrivilegeEscalation: false
#  capabilities:
#    drop:
#    - ALL
#  readOnlyRootFilesystem: true

serviceAccount:
  enabled: false
  name: ""

initContainers:
  gitSync:
    enabled: false
    repo: "git@github.com:<org>/<repo>"
    branch: "main"
    secretName: ""
  # S3 config setup (only used when s3Config.enabled=true)
  s3ConfigSetup:
    image:
      repository: gcr.io/hasura-ee/aws-cli
      tag: 2.32.7
      pullPolicy: IfNotPresent
  # Extra init containers - only for S3 downloads
  extraInitContainers: |
    {{- if and .Values.connectorConfig.enabled .Values.connectorConfig.s3Config.enabled }}
    - name: setup-s3-config
      image: {{ .Values.initContainers.s3ConfigSetup.image.repository }}:{{ .Values.initContainers.s3ConfigSetup.image.tag }}
      imagePullPolicy: {{ .Values.initContainers.s3ConfigSetup.image.pullPolicy }}
      command:
      - sh
      - -c
      - |
        set -e
        echo "Syncing configuration from S3..."
        echo "Source: s3://{{ .Values.connectorConfig.s3Config.bucket }}/{{ .Values.connectorConfig.s3Config.prefix }}"
        echo "Destination: {{ .Values.connectorConfig.mountPath }}/"

        aws s3 sync \
          s3://{{ .Values.connectorConfig.s3Config.bucket }}/{{ .Values.connectorConfig.s3Config.prefix }} \
          {{ .Values.connectorConfig.mountPath }}/ \
          --delete

        echo "S3 sync complete. Files synced:"
        find {{ .Values.connectorConfig.mountPath }} -type f | sort
      env:
      {{- if not .Values.connectorConfig.s3Config.useIRSA }}
      - name: AWS_ACCESS_KEY_ID
        valueFrom:
          secretKeyRef:
            name: {{ .Values.connectorConfig.s3Config.credentialsSecret }}
            key: access-key-id
      - name: AWS_SECRET_ACCESS_KEY
        valueFrom:
          secretKeyRef:
            name: {{ .Values.connectorConfig.s3Config.credentialsSecret }}
            key: secret-access-key
      {{- end }}
      - name: AWS_DEFAULT_REGION
        value: {{ .Values.connectorConfig.s3Config.region | quote }}
      volumeMounts:
      - name: connector-config-dest
        mountPath: {{ .Values.connectorConfig.mountPath }}
      {{- if and (not ((.Values.global).securityContext).disabled) .Values.securityContext }}
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      {{- end }}
    {{- end }}

healthChecks:
  enabled: false
  livenessProbePath: "/healthz"
  readinessProbePath: "/healthz"

hpa:
  enabled: false
  minReplicas: 2
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50

resources: |
  requests:
    cpu: "500m"
    memory: "500Mi"
  limits:
    cpu: "1"
    memory: "1Gi"

# Connector Configuration
connectorConfig:
  enabled: false
  mountPath: "/etc/connector"

  # ConfigMap-based configuration (Option 1 - Direct Mount)
  # Root-level configuration files from ConfigMap
  rootConfig:
    enabled: false
    configMapName: "connector-root-config"

  # Schema directory configuration files from ConfigMap
  schemaConfig:
    enabled: false
    configMapName: "connector-schema-config"

  # S3-based configuration (Option 2 - Requires InitContainer)
  s3Config:
    enabled: false
    bucket: "my-config-bucket"
    region: "us-east-1"

    # AWS Credentials (not needed if using IRSA on EKS)
    useIRSA: false
    credentialsSecret: "aws-credentials"

    # S3 prefix to sync (everything under this prefix will be copied)
    # Examples:
    #   "" - sync entire bucket
    #   "configs/" - sync everything from configs/ folder
    #   "prod/mongodb/" - sync everything from prod/mongodb/ folder
    prefix: ""

connectorEnvVars:
  HASURA_SERVICE_TOKEN_SECRET: ""
  MONGODB_DATABASE_URI: ""
  configDirectory: ""
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://dp-otel-collector:4317"
  OTEL_SERVICE_NAME: ""

env: |
  {{- if .Values.connectorEnvVars.HASURA_SERVICE_TOKEN_SECRET }}
  - name: HASURA_SERVICE_TOKEN_SECRET
    valueFrom:
      secretKeyRef:
        key: HASURA_SERVICE_TOKEN_SECRET
        name: {{ printf "%s-secret" (include "common.name" .) }}
  {{- end }}
  - name: MONGODB_DATABASE_URI
    valueFrom:
      secretKeyRef:
        key: MONGODB_DATABASE_URI
        name: {{ printf "%s-secret" (include "common.name" .) }}
  - name: OTEL_EXPORTER_OTLP_ENDPOINT
    value: {{ .Values.connectorEnvVars.OTEL_EXPORTER_OTLP_ENDPOINT }}
  {{- if .Values.connectorEnvVars.OTEL_SERVICE_NAME }}
  - name: OTEL_SERVICE_NAME
    value: {{ .Values.connectorEnvVars.OTEL_SERVICE_NAME }}
  {{- else }}
  - name: OTEL_SERVICE_NAME
    value: {{ .Chart.Name }}
  {{- end }}
  {{- if .Values.connectorEnvVars.configDirectory }}
  - name: HASURA_CONFIGURATION_DIRECTORY
    value: {{ .Values.connectorEnvVars.configDirectory }}
  {{- else if .Values.connectorConfig.enabled }}
  - name: HASURA_CONFIGURATION_DIRECTORY
    value: {{ .Values.connectorConfig.mountPath }}
  {{- end }}

# Extra volumes for connector config
extraVolumes: |
  {{- if .Values.connectorConfig.enabled }}
  {{- if .Values.connectorConfig.s3Config.enabled }}
  {{- /* S3 mode: need emptyDir for downloads */}}
  - name: connector-config-dest
    emptyDir: {}
  {{- else }}
  {{- /* ConfigMap mode: direct mounts (no emptyDir needed) */}}
  {{- if .Values.connectorConfig.rootConfig.enabled }}
  - name: connector-root-config
    configMap:
      name: {{ .Values.connectorConfig.rootConfig.configMapName }}
  {{- end }}
  {{- if .Values.connectorConfig.schemaConfig.enabled }}
  - name: connector-schema-config
    configMap:
      name: {{ .Values.connectorConfig.schemaConfig.configMapName }}
  {{- end }}
  {{- end }}
  {{- end }}

# Extra volume mounts for main container
extraVolumeMounts: |
  {{- if .Values.connectorConfig.enabled }}
  {{- if .Values.connectorConfig.s3Config.enabled }}
  {{- /* S3 mode: mount emptyDir */}}
  - name: connector-config-dest
    mountPath: {{ .Values.connectorConfig.mountPath }}
  {{- else }}
  {{- /* ConfigMap mode: direct mounts */}}
  {{- if .Values.connectorConfig.rootConfig.enabled }}
  - name: connector-root-config
    mountPath: {{ .Values.connectorConfig.mountPath }}
  {{- end }}
  {{- if .Values.connectorConfig.schemaConfig.enabled }}
  - name: connector-schema-config
    mountPath: {{ .Values.connectorConfig.mountPath }}/schema
  {{- end }}
  {{- end }}
  {{- end }}
