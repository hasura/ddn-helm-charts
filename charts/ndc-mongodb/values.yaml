useReleaseName: true

additionalAnnotations: |
  checksum/config: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
  app.kubernetes.io/access-group: connector

networkPolicy:
  ingress:
    enabled: true
    allowedApps:
      - v3-engine

# Container Configs
image:
  repository: ""
  tag: ""
  pullPolicy: IfNotPresent
replicas: "1"
wsInactiveExpiryMins: "1"
securityContext:
  runAsNonRoot: true
  runAsGroup: 1000
  runAsUser: 1000
  fsGroup: 1000

containerSecurityContext:
#  runAsNonRoot: true
#  allowPrivilegeEscalation: false
#  capabilities:
#    drop:
#    - ALL
#  readOnlyRootFilesystem: true

serviceAccount:
  enabled: false
  name: ""

initContainers:
  gitSync:
    enabled: false
    repo: "git@github.com:<org>/<repo>"
    branch: "main"
    secretName: ""
  # Images for config setup initContainer
  # Automatically selected based on connectorConfig.s3Config.enabled
  configSetup:
    # Used when s3Config.enabled=false (ConfigMaps)
    image:
      repository: gcr.io/hasura-ee/busybox
      tag: 1.37.0
      pullPolicy: IfNotPresent
  s3ConfigSetup:
    # Used when s3Config.enabled=true (S3)
    image:
      repository: gcr.io/hasura-ee/aws-cli
      tag: 2.32.7
      pullPolicy: IfNotPresent
  # Extra init containers for setting up configuration
  extraInitContainers: |
    {{- if .Values.connectorConfig.enabled }}
    {{- if or .Values.connectorConfig.s3Config.enabled (and .Values.connectorConfig.rootConfig.enabled .Values.connectorConfig.schemaConfig.enabled) }}
    - name: setup-connector-config
      {{- if .Values.connectorConfig.s3Config.enabled }}
      image: {{ .Values.initContainers.s3ConfigSetup.image.repository }}:{{ .Values.initContainers.s3ConfigSetup.image.tag }}
      imagePullPolicy: {{ .Values.initContainers.s3ConfigSetup.image.pullPolicy }}
      {{- else }}
      image: {{ .Values.initContainers.configSetup.image.repository }}:{{ .Values.initContainers.configSetup.image.tag }}
      imagePullPolicy: {{ .Values.initContainers.configSetup.image.pullPolicy }}
      {{- end }}
      command:
      - sh
      - -c
      - |
        set -e
        echo "Setting up connector configuration..."
        
        {{- if .Values.connectorConfig.s3Config.enabled }}
        # S3 Configuration
        echo "Downloading configuration from S3..."
        
        {{- if .Values.connectorConfig.s3Config.rootFiles.enabled }}
        # Download root files from S3
        echo "Downloading root configuration files from S3..."
        {{- range .Values.connectorConfig.s3Config.rootFiles.files }}
        echo "  Downloading {{ .source }} to {{ $.Values.connectorConfig.mountPath }}/{{ .dest }}"
        aws s3 cp s3://{{ $.Values.connectorConfig.s3Config.bucket }}/{{ .source }} {{ $.Values.connectorConfig.mountPath }}/{{ .dest }}
        {{- end }}
        {{- end }}
        
        {{- if .Values.connectorConfig.s3Config.schemaFolder.enabled }}
        # Download schema folder from S3
        echo "Creating schema directory..."
        mkdir -p {{ .Values.connectorConfig.mountPath }}/schema
        echo "Syncing schema files from s3://{{ .Values.connectorConfig.s3Config.bucket }}/{{ .Values.connectorConfig.s3Config.schemaFolder.prefix }}"
        aws s3 sync s3://{{ .Values.connectorConfig.s3Config.bucket }}/{{ .Values.connectorConfig.s3Config.schemaFolder.prefix }} {{ .Values.connectorConfig.mountPath }}/schema/
        {{- end }}
        
        {{- else }}
        # ConfigMap Configuration
        {{- if .Values.connectorConfig.rootConfig.enabled }}
        # Copy root files from ConfigMap
        echo "Copying root configuration files from ConfigMap: {{ .Values.connectorConfig.rootConfig.configMapName }}"
        cp /tmp/root-config/* {{ .Values.connectorConfig.mountPath }}/
        {{- end }}
        
        {{- if .Values.connectorConfig.schemaConfig.enabled }}
        # Create schema directory and copy schema files from ConfigMap
        echo "Creating schema directory..."
        mkdir -p {{ .Values.connectorConfig.mountPath }}/schema
        echo "Copying schema files from ConfigMap: {{ .Values.connectorConfig.schemaConfig.configMapName }}"
        cp /tmp/schema-config/* {{ .Values.connectorConfig.mountPath }}/schema/
        {{- end }}
        {{- end }}
        
        echo "Configuration setup complete:"
        find {{ .Values.connectorConfig.mountPath }} -type f
      {{- if .Values.connectorConfig.s3Config.enabled }}
      env:
      {{- if not .Values.connectorConfig.s3Config.useIRSA }}
      - name: AWS_ACCESS_KEY_ID
        valueFrom:
          secretKeyRef:
            name: {{ .Values.connectorConfig.s3Config.credentialsSecret }}
            key: access-key-id
      - name: AWS_SECRET_ACCESS_KEY
        valueFrom:
          secretKeyRef:
            name: {{ .Values.connectorConfig.s3Config.credentialsSecret }}
            key: secret-access-key
      {{- end }}
      - name: AWS_DEFAULT_REGION
        value: {{ .Values.connectorConfig.s3Config.region | quote }}
      {{- end }}
      volumeMounts:
      {{- if not .Values.connectorConfig.s3Config.enabled }}
      {{- if .Values.connectorConfig.rootConfig.enabled }}
      - name: connector-root-config
        mountPath: /tmp/root-config
        readOnly: true
      {{- end }}
      {{- if .Values.connectorConfig.schemaConfig.enabled }}
      - name: connector-schema-config
        mountPath: /tmp/schema-config
        readOnly: true
      {{- end }}
      {{- end }}
      - name: connector-config-dest
        mountPath: {{ .Values.connectorConfig.mountPath }}
      {{- if and (not ((.Values.global).securityContext).disabled) .Values.securityContext }}
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      {{- end }}
    {{- end }}
    {{- end }}

healthChecks:
  enabled: false
  livenessProbePath: "/healthz"
  readinessProbePath: "/healthz"

hpa:
  enabled: false
  minReplicas: 2
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50

resources: |
  requests:
    cpu: "500m"
    memory: "500Mi"
  limits:
    cpu: "1"
    memory: "1Gi"

# Connector Configuration - Using ConfigMaps OR S3
connectorConfig:
  enabled: false
  mountPath: "/etc/connector"
  
  # ConfigMap-based configuration (Option 1)
  # Root-level configuration files from ConfigMap
  rootConfig:
    enabled: false
    # Name of externally-created ConfigMap
    configMapName: "connector-root-config"
  
  # Schema directory configuration files from ConfigMap
  schemaConfig:
    enabled: false
    # Name of externally-created ConfigMap
    configMapName: "connector-schema-config"
  
  # S3-based configuration (Option 2)
  s3Config:
    enabled: false
    bucket: "my-config-bucket"
    region: "us-east-1"
    
    # AWS Credentials (not needed if using IRSA)
    useIRSA: false
    credentialsSecret: "aws-credentials"  # Secret with access-key-id and secret-access-key
    
    # Root files to download from S3
    rootFiles:
      enabled: false
      files:
        - source: "configuration.json"
          dest: "configuration.json"
        - source: "connector.yaml"
          dest: "connector.yaml"
    
    # Schema folder to sync from S3
    schemaFolder:
      enabled: false
      prefix: "schema/"  # S3 prefix/folder path

connectorEnvVars:
  HASURA_SERVICE_TOKEN_SECRET: ""
  MONGODB_DATABASE_URI: ""
  configDirectory: ""
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://dp-otel-collector:4317"
  OTEL_SERVICE_NAME: ""

env: |
  {{- if .Values.connectorEnvVars.HASURA_SERVICE_TOKEN_SECRET }}
  - name: HASURA_SERVICE_TOKEN_SECRET
    valueFrom:
      secretKeyRef:
        key: HASURA_SERVICE_TOKEN_SECRET
        name: {{ printf "%s-secret" (include "common.name" .) }}
  {{- end }}
  - name: MONGODB_DATABASE_URI
    valueFrom:
      secretKeyRef:
        key: MONGODB_DATABASE_URI
        name: {{ printf "%s-secret" (include "common.name" .) }}
  - name: OTEL_EXPORTER_OTLP_ENDPOINT
    value: {{ .Values.connectorEnvVars.OTEL_EXPORTER_OTLP_ENDPOINT }}
  {{- if .Values.connectorEnvVars.OTEL_SERVICE_NAME }}
  - name: OTEL_SERVICE_NAME
    value: {{ .Values.connectorEnvVars.OTEL_SERVICE_NAME }}
  {{- else }}
  - name: OTEL_SERVICE_NAME
    value: {{ .Chart.Name }}
  {{- end }}
  {{- if .Values.connectorEnvVars.configDirectory }}
  - name: HASURA_CONFIGURATION_DIRECTORY
    value: {{ .Values.connectorEnvVars.configDirectory }}
  {{- else if .Values.connectorConfig.enabled }}
  - name: HASURA_CONFIGURATION_DIRECTORY
    value: {{ .Values.connectorConfig.mountPath }}
  {{- end }}

# Extra volumes for connector config
extraVolumes: |
  {{- if .Values.connectorConfig.enabled }}
  {{- if not .Values.connectorConfig.s3Config.enabled }}
  {{- if .Values.connectorConfig.rootConfig.enabled }}
  - name: connector-root-config
    configMap:
      name: {{ .Values.connectorConfig.rootConfig.configMapName }}
  {{- end }}
  {{- if .Values.connectorConfig.schemaConfig.enabled }}
  - name: connector-schema-config
    configMap:
      name: {{ .Values.connectorConfig.schemaConfig.configMapName }}
  {{- end }}
  {{- end }}
  - name: connector-config-dest
    emptyDir: {}
  {{- end }}

# Extra volume mounts for main container
extraVolumeMounts: |
  {{- if .Values.connectorConfig.enabled }}
  - name: connector-config-dest
    mountPath: {{ .Values.connectorConfig.mountPath }}
  {{- end }}